<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <!-- SEO -->
  <meta name="description"
    content="VIP Number World — Buy & sell premium VIP, fancy and lucky mobile numbers. Handpicked, genuine and securely transferred." />
  <meta name="keywords" content="VIP numbers, fancy numbers, lucky numbers, premium mobile numbers, buy VIP number" />

  <!-- Open Graph -->
  <meta property="og:title" content="VIP Number World — Your Number. Your Identity." />
  <meta property="og:description" content="Premium VIP, fancy & lucky mobile numbers marketplace." />
  <meta property="og:type" content="website" />

  <meta name="theme-color" content="#FBFAF7" />
  <script>
    (function () {
      var theme = 'system';
      try {
        var storedTheme = window.localStorage.getItem('vnw_theme');
        if (storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system') {
          theme = storedTheme;
        }
      } catch (error) {
        theme = 'system';
      }

      var resolvedTheme = theme;
      if (theme === 'system') {
        try {
          resolvedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        } catch (error) {
          resolvedTheme = 'light';
        }
      }

      var root = document.documentElement;
      root.classList.toggle('dark', resolvedTheme === 'dark');
      root.setAttribute('data-theme', resolvedTheme);
      root.style.colorScheme = resolvedTheme;

      var themeColor = document.querySelector('meta[name="theme-color"]');
      if (themeColor) {
        themeColor.setAttribute('content', resolvedTheme === 'dark' ? '#12100F' : '#FBFAF7');
      }
    })();
  </script>
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="VIP Number World" />

  <title>VIP Number World — Premium VIP Numbers Marketplace</title>

  <link rel="icon" type="image/png" href="/logo/logo.png" />
  <link rel="apple-touch-icon" href="/logo/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Razorpay Checkout -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
